<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>New Tab</title>

        <link rel="stylesheet" href="styles/retroma.css" />
    </head>
    <body>
        <main class="container">
            <!-- TOP BAR -->
            <section class="card github-section">
                <a href=""> label </a>

                <span class="pipe">|</span>

                <a href=""> label </a>

                <a href=""> label </a>

                <span class="pipe">|</span>

                <a href=""> label </a>

                <span class="pipe">|</span>

                <a href=""> label </a>
            </section>

            <!-- SEARCH BAR -->
            <section class="search-section">
                <form action="https://www.google.com/search" method="GET">
                    <input
                        type="text"
                        name="q"
                        class="search-input"
                        placeholder="Search (googoo)"
                        autocomplete="off"
                        required
                    />
                </form>
            </section>

            <!-- LINK GRID -->
            <section class="card links-section">
                <h2>Links</h2>

                <div class="link-grid">
                    <a class="link-card" href=""> label </a>

                    <a class="link-card" href=""> label </a>

                    <a class="link-card" href=""> label </a>

                    <a class="link-card" href=""> label </a>
                </div>
            </section>
        </main>
    </body>
</html>
